name: Deploy Web Application to Amazon EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Amazon EKS
    runs-on: ubuntu-latest

    steps:

      # Step 1: Download the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Install kubectl
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      # Step 3: Install Kustomize
      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      # Step 4: Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 5: Connect to the EKS Cluster
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      # Step 6: Verify Cluster Connection
      - name: Verify Cluster
        run: |
          kubectl get nodes

      # Step 7: Preview the generated Kubernetes manifests
      - name: Preview Kustomize Output
        run: |
          kustomize build ./kustomize-capstone/overlays/prod

      # Step 8: Deploy to EKS
      - name: Deploy Application
        run: |
          kubectl apply -k ./kustomize-capstone/overlays/prod

      # Step 9: Verify Deployment
      - name: Verify Deployment
        run: |
          kubectl get deployments
          kubectl get pods
          kubectl get services

      # The total script