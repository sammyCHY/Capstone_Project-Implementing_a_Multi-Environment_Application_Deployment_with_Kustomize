apiVersion: apps/v1
kind: Deployment

metadata:
  name: webapp

spec:
  replicas: 3

  selector:
    matchLabels:
      app: webapp

  template:
    metadata:
      labels:
        app: webapp

    spec:
      containers:
        - name: webapp
          image: nginx:latest

          envFrom:
            - configMapRef:
                name: webapp-config

            - secretRef:
                name: webapp-secret

          ports:
            - containerPort: 80