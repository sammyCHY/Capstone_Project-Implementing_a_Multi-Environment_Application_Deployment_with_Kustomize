apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patchesStrategicMerge:
  - replica_count_dev.yaml

configMapGenerator:
  - name: webapp-config
    behavior: merge
    literals:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG

secretGenerator:
  - name: webapp-secret
    behavior: merge
    literals:
      - DATABASE_USER=devuser
      - DATABASE_PASSWORD=DevPassword123
      
namePrefix: dev-