apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patchesStrategicMerge:
  - replica_count_prod.yaml

commonLabels:
  environment: production

configMapGenerator:
  - name: webapp-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=ERROR

commonLabels:
  environment: production
  team: devops
  project: kustomize-capstone

commonAnnotations:
  owner: DevOps-Team
  managed-by: Kustomize
  environment: Production

secretGenerator:
  - name: webapp-secret
    behavior: merge
    literals:
      - DATABASE_USER=produser
      - DATABASE_PASSWORD=ProdPassword123

namePrefix: prod-